# =============================================================================
# Perfil LOCAL — H2 en memoria, sin necesidad de RDS ni variables de entorno.
#
# Activar con:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#   o: export SPRING_PROFILES_ACTIVE=local && ./mvnw spring-boot:run
#
# Consola H2: http://localhost:8080/h2-console
#   JDBC URL:  jdbc:h2:mem:ecomdb
#   Usuario:   sa
#   Password:  (vacío)
# =============================================================================

# ---- DataSource — H2 en memoria --------------------------------------------
# Sobreescribe spring.datasource.* de application.properties; los placeholders
# ${SPRING_DATASOURCE_URL} etc. nunca se evalúan cuando este perfil está activo.
spring.datasource.url=jdbc:h2:mem:ecomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate -------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# data.sql debe ejecutarse DESPUÉS de que Hibernate cree el esquema
spring.jpa.defer-datasource-initialization=true

# ---- JWT -------------------------------------------------------------------
jwt.secret=local-dev-secret-key-for-testing-purposes-min-32-chars
jwt.expiration=86400000

# ---- Consola H2 ------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

