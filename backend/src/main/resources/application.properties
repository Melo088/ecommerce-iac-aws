# ---- Server ----------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---- DataSource (variables de entorno inyectadas por systemd / ECS) -------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- JWT -------------------------------------------------------------------
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_LONG_RANDOM_SECRET_KEY_MIN32}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ---- MercadoPago -----------------------------------------------------------
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# ---- Actuator --------------------------------------------------------------
# El health check del ALB apunta a /api/v1/health (HealthController custom).
# Actuator se mantiene en /actuator para monitoreo interno.
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
