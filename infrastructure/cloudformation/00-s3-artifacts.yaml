AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ecommerce-iac-aws — Bucket S3 para artefactos del backend (JAR de Spring Boot).
  Versionado habilitado, acceso público bloqueado.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Entorno de despliegue

  Owner:
    Type: String
    Default: Melo088-Esteban-GV
    Description: Propietarios del stack

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ecom-artifacts-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: ecommerce-iac-aws
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  ArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowVoclabsGetObject
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSSMRoleForInstancesQuickSetup'
            Action: 's3:GetObject'
            Resource: !Sub '${ArtifactsBucket.Arn}/*'
          - Sid: AllowVoclabsListBucket
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:role/AmazonSSMRoleForInstancesQuickSetup'
            Action: 's3:ListBucket'
            Resource: !GetAtt ArtifactsBucket.Arn

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ArtifactsBucketName:
    Description: Nombre del bucket S3 de artefactos
    Value: !Ref ArtifactsBucket
    Export:
      Name: ecom-s3-artifacts-bucket-name

  ArtifactsBucketArn:
    Description: ARN del bucket S3 de artefactos
    Value: !GetAtt ArtifactsBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucketArn'
